<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card cosy">
  <div class="eyebrow">Buttons</div>
  <div class="row" style="gap:14px;flex-wrap:wrap;align-items:center;">
    <button style="border:none;background:#E5294A;color:#fff;padding:12px 22px;border-radius:999px;font:600 13px/1 var(--bj-font-ui);box-shadow:0 8px 24px rgba(229,41,74,0.25);display:inline-flex;gap:6px;align-items:center;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
      Activate
    </button>
    <button style="background:transparent;color:#fff;border:1px solid #34343C;padding:11px 20px;border-radius:999px;font:500 13px/1 var(--bj-font-ui);">Snooze</button>
    <button style="background:transparent;color:#A8A8B3;border:1px solid #26262C;padding:11px 20px;border-radius:999px;font:500 13px/1 var(--bj-font-ui);">Why?</button>
    <button style="background:#0E0E10;color:#A8A8B3;border:1px solid #26262C;padding:11px 16px;border-radius:8px;font:500 12px/1 var(--bj-font-ui);display:inline-flex;align-items:center;gap:6px;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
      Refresh
    </button>
  </div>
  <div class="row" style="gap:18px;flex-wrap:wrap;"><span class="mono">Primary · #E5294A</span><span class="mono">Outline · 1px #34343C</span><span class="mono">Ghost · 1px #26262C</span></div>
</div>
</body></html>
