<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card cosy" style="background:#1A1A1A;border-radius:12px;width:700px;">
  <div class="eyebrow" style="color:#A8A8B3;">Forbidden — refuse on sight</div>
  <div class="col" style="gap:10px;">
    <div class="row" style="gap:10px;"><div style="width:18px;height:18px;border-radius:4px;background:#0099D6;"></div><span class="mono" style="color:#fff;">#0099D6  ADIB cyan</span><span class="label">— different client</span></div>
    <div class="row" style="gap:10px;"><div style="width:18px;height:18px;border-radius:4px;background:#1E2D5C;"></div><span class="mono" style="color:#fff;">#1E2D5C  ADIB navy</span></div>
    <div class="row" style="gap:10px;"><div style="width:18px;height:18px;border-radius:4px;background:#00B0E5;"></div><span class="mono" style="color:#fff;">#00B0E5  electric cyan</span></div>
    <div class="row" style="gap:10px;"><div style="width:18px;height:18px;border-radius:4px;background:linear-gradient(135deg,#F5C242,#D4A017);"></div><span class="mono" style="color:#fff;">amber / gold</span><span class="label">— wrong category energy</span></div>
    <div class="row" style="gap:10px;"><div style="width:18px;height:18px;border-radius:4px;background:#4F46E5;"></div><span class="mono" style="color:#fff;">indigo / generic AI-purple</span></div>
    <div class="row" style="gap:10px;"><div style="width:18px;height:18px;border-radius:4px;background:#FFFFFF;border:1px solid #34343C;"></div><span class="mono" style="color:#fff;">#FFFFFF surface</span><span class="label">— white voids forbidden</span></div>
  </div>
</div>
</body></html>
