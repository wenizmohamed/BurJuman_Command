<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card cosy">
  <div class="eyebrow">Hex / honeycomb card — ops taxonomy primitive</div>
  <svg width="640" height="170" viewBox="0 0 640 170" style="display:block;">
    <defs>
      <symbol id="hex" viewBox="-50 -58 100 116">
        <polygon points="0,-55 48,-27.5 48,27.5 0,55 -48,27.5 -48,-27.5" fill="#0E0E10" stroke="#26262C" stroke-width="1.2" stroke-linejoin="round" rx="8"/>
      </symbol>
    </defs>
    <g transform="translate(60,85)"><use href="#hex"/><text text-anchor="middle" y="-12" fill="#A8A8B3" font-family="Inter" font-size="9" letter-spacing="1.5">FOOTFALL</text><text text-anchor="middle" y="8" fill="#fff" font-family="Inter" font-weight="600" font-size="20">42.3K</text><text text-anchor="middle" y="28" fill="#2EE6A0" font-family="Inter" font-size="10">+8.4%</text></g>
    <g transform="translate(160,85)"><use href="#hex"/><text text-anchor="middle" y="-12" fill="#A8A8B3" font-family="Inter" font-size="9" letter-spacing="1.5">SALES</text><text text-anchor="middle" y="8" fill="#fff" font-family="Inter" font-weight="600" font-size="18">14.2M</text><text text-anchor="middle" y="28" fill="#FF4D6A" font-family="Inter" font-size="10">−1.8%</text></g>
    <g transform="translate(260,85)"><use href="#hex"/><text text-anchor="middle" y="-12" fill="#A8A8B3" font-family="Inter" font-size="9" letter-spacing="1.5">CONV.</text><text text-anchor="middle" y="8" fill="#fff" font-family="Inter" font-weight="600" font-size="20">38%</text><text text-anchor="middle" y="28" fill="#2EE6A0" font-family="Inter" font-size="10">+2.1pp</text></g>
    <g transform="translate(360,85)"><use href="#hex"/><text text-anchor="middle" y="-12" fill="#A8A8B3" font-family="Inter" font-size="9" letter-spacing="1.5">CRM</text><text text-anchor="middle" y="8" fill="#fff" font-family="Inter" font-weight="600" font-size="20">28.1K</text><text text-anchor="middle" y="28" fill="#2EE6A0" font-family="Inter" font-size="10">+4.0%</text></g>
    <g transform="translate(460,85)"><use href="#hex"/><text text-anchor="middle" y="-12" fill="#A8A8B3" font-family="Inter" font-size="9" letter-spacing="1.5">DIGITAL</text><text text-anchor="middle" y="8" fill="#fff" font-family="Inter" font-weight="600" font-size="20">94K</text><text text-anchor="middle" y="28" fill="#2EE6A0" font-family="Inter" font-size="10">+12%</text></g>
    <g transform="translate(560,85)"><use href="#hex"/><text text-anchor="middle" y="-12" fill="#A8A8B3" font-family="Inter" font-size="9" letter-spacing="1.5">OPS</text><text text-anchor="middle" y="8" fill="#fff" font-family="Inter" font-weight="600" font-size="18">96%</text><text text-anchor="middle" y="28" fill="#A8A8B3" font-family="Inter" font-size="10">tenant sat</text></g>
  </svg>
  <span class="mono">HexCard · 6 KPI families · radius-soft 8px on corner</span>
</div>
</body></html>
