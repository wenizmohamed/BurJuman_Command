<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card cosy">
  <div class="eyebrow">Elevation — by surface tone, not by shadow</div>
  <div class="grid-3" style="gap:18px;">
    <div style="background:#000000;border:1px dashed #26262C;height:90px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--bj-font-mono);font-size:11px;color:#A8A8B3;">Body #000</div>
    <div style="background:#0E0E10;height:90px;border-radius:12px;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-family:var(--bj-font-mono);font-size:11px;color:#fff;">Card #0E0E10 + inset 6%</div>
    <div style="background:#15151A;height:90px;border-radius:12px;box-shadow:0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px #26262C;display:flex;align-items:center;justify-content:center;font-family:var(--bj-font-mono);font-size:11px;color:#fff;">Modal #15151A + shadow</div>
  </div>
  <div class="label">Drop shadows are reserved for modals + the CTA glow only.</div>
</div>
</body></html>
