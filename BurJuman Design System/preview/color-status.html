<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card cosy">
  <div class="eyebrow">Status — delta chips + live dot</div>
  <div class="row" style="gap:16px;flex-wrap:wrap;">
    <span style="display:inline-flex;align-items:center;gap:4px;background:rgba(46,230,160,0.12);color:#2EE6A0;padding:4px 10px;border-radius:999px;font:500 12px/1 var(--bj-font-ui);font-variant-numeric:tabular-nums;">▲ +8.4% WoW</span>
    <span style="display:inline-flex;align-items:center;gap:4px;background:rgba(255,77,106,0.12);color:#FF4D6A;padding:4px 10px;border-radius:999px;font:500 12px/1 var(--bj-font-ui);font-variant-numeric:tabular-nums;">▼ −1,240 ft/hr</span>
    <span style="display:inline-flex;align-items:center;gap:6px;color:#A8A8B3;font:500 12px/1 var(--bj-font-ui);"><span style="width:8px;height:8px;border-radius:50%;background:#2EE6A0;box-shadow:0 0 0 4px rgba(46,230,160,0.15);"></span>live · refreshed 14s ago</span>
  </div>
  <div class="grid-3">
    <div class="col"><span class="label">Positive</span><span class="mono">#2EE6A0</span></div>
    <div class="col"><span class="label">Negative</span><span class="mono">#FF4D6A</span></div>
    <div class="col"><span class="label">Live dot</span><span class="mono">#2EE6A0 · 2s pulse</span></div>
  </div>
</div>
</body></html>
