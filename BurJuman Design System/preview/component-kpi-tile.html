<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card cosy">

    <div style="background:#0E0E10;border-radius:12px;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);padding:18px 20px;display:flex;flex-direction:column;gap:10px;">
      <span style="font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:#A8A8B3;font-weight:500;">TENANT SALES · WEEK</span>

      <svg viewBox="0 0 200 40" width="100%" height="36" preserveAspectRatio="none"><polyline points="0,20 20,22 40,18 60,24 80,20 100,16 120,18 140,14 160,16 180,12 200,14" fill="none" stroke="#C7256D" stroke-width="2"/></svg>
      <span style="display:inline-flex;align-self:flex-start;align-items:center;gap:4px;background:rgba(255,77,106,0.12);color:#FF4D6A;padding:3px 8px;border-radius:999px;font:500 11px/1 var(--bj-font-ui);font-variant-numeric:tabular-nums;">▼ −1.8% MoM</span>
    </div>
  </div>
</div>
