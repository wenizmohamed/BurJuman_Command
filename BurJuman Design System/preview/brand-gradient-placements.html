<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card cosy">
  <div class="eyebrow">Gradient ribbon — placements</div>
  <div class="col" style="gap:10px;">

    <span class="mono">brand-bar full-width · h≤80 · vertical center</span>

    </div>
    <span class="mono">left rail · top accent · full-bleed title slide</span>
  </div>
