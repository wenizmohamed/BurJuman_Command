<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card cosy">
  <div class="eyebrow">CTA accent — Activate / Book only</div>
  <div class="row" style="gap:16px;">
    <button style="border:none;background:#E5294A;color:#fff;padding:14px 28px;border-radius:999px;font:600 14px/1 var(--bj-font-ui);box-shadow:0 8px 24px rgba(229,41,74,0.25);display:inline-flex;gap:8px;align-items:center;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
      Activate
    </button>
    <div class="grid-3" style="flex:1;gap:8px;">
      <div class="swatch" style="background:#E5294A;height:48px;"><span class="hex">#E5294A · fill</span></div>
      <div class="swatch" style="background:#FF3B5C;height:48px;"><span class="hex">#FF3B5C · hover</span></div>
      <div class="swatch" style="background:#C71F3D;height:48px;"><span class="hex">#C71F3D · press</span></div>
    </div>
  </div>
  <div class="label">Coral-red. Used only for the primary CTA. Never decoration.</div>
</div>
</body></html>
