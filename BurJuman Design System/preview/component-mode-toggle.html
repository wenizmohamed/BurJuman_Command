<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card cosy">
  <div class="eyebrow">Mode toggle — Story / Explore</div>
  <div class="row" style="gap:24px;align-items:center;">
    <div style="background:#0E0E10;border:1px solid #26262C;border-radius:999px;padding:4px;display:inline-flex;">
      <button style="background:#15151A;color:#fff;border:none;padding:8px 16px;border-radius:999px;font:500 12px/1 var(--bj-font-ui);display:inline-flex;align-items:center;gap:6px;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><path d="M3 9h18M9 21V9"/></svg>
        Story
      </button>
      <button style="background:transparent;color:#A8A8B3;border:none;padding:8px 16px;border-radius:999px;font:500 12px/1 var(--bj-font-ui);display:inline-flex;align-items:center;gap:6px;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Explore
      </button>
    </div>
    <span class="label">Default = Story (executive). Explore unlocks dense ops view.</span>
  </div>
</div>
</body></html>
